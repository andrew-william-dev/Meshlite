apiVersion: v1
kind: Namespace
metadata:
  name: meshlite-test

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: validator-cross
  namespace: meshlite-test
  labels:
    app: validator-cross
spec:
  replicas: 1
  selector:
    matchLabels:
      app: validator-cross
  template:
    metadata:
      labels:
        app: validator-cross
        meshlite.io/service: validator-cross
    spec:
      containers:
        - name: validator-cross
          image: meshlite/service-validator:demo
          imagePullPolicy: IfNotPresent
          env:
            - name: SERVICE_NAME
              value: validator-cross
            - name: CLUSTER_NAME
              value: cluster-2
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
          resources:
            requests:
              cpu: 50m
              memory: 48Mi
            limits:
              cpu: 200m
              memory: 96Mi

---
apiVersion: v1
kind: Service
metadata:
  name: validator-cross
  namespace: meshlite-test
spec:
  selector:
    app: validator-cross
  ports:
    - name: http
      port: 8080
      targetPort: 8080
