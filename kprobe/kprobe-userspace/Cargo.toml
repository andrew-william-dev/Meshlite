[package]
name = "kprobe-userspace"
version = "0.1.0"
edition = "2021"

[dependencies]
# Aya userspace — loads and manages eBPF programs
aya = { version = "0.13", features = ["async_tokio"] }
aya-log = "0.2"

# gRPC client for Sigil (generated from sigil.proto via build.rs)
tonic = { version = "0.12", features = ["tls", "tls-roots"] }
prost = "0.13"
tokio-stream = "0.1"
futures      = "0.3"

# Pod watcher — Kubernetes API
kube  = { version = "0.95", features = ["runtime", "derive"] }
k8s-openapi = { version = "0.23", features = ["v1_30"] }

# TLS for mTLS reconnect
rustls         = { version = "0.23", features = ["ring"] }
rustls-pemfile = "2"

# Async runtime
tokio = { version = "1", features = ["full"] }

# Buffer type used when reading perf event records
bytes = "1"

# Error handling and logging
anyhow = "1"
log = "0.4"
env_logger = "0.11"

# CLI argument parsing
clap = { version = "4", features = ["derive", "env"] }

# Pure-Rust ECDSA P-256 key generation (used at startup to generate node key)
# Use ring backend to match rustls; disable aws-lc-rs default to avoid dual-CryptoProvider panic
rcgen = { version = "0.13", default-features = false, features = ["pem", "ring"] }

[build-dependencies]
tonic-build = "0.12"

[[bin]]
name = "kprobe-loader"
path = "src/main.rs"

[lib]
name = "kprobe_userspace"
path = "src/lib.rs"
