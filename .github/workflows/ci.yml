name: ci

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed areas
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            code:
              - '.github/workflows/**'
              - 'charts/**'
              - 'conduit/**'
              - 'crates/**'
              - 'hack/**'
              - 'kprobe/**'
              - 'meshctl/**'
              - 'sigil/**'
              - 'trace/**'
            docker:
              - '**/Dockerfile'
              - 'conduit/**'
              - 'kprobe/**'
              - 'sigil/**'
              - 'trace/**'

  validate:
    name: Validate core build and charts
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
          cache: true
          cache-dependency-path: |
            sigil/go.sum
            meshctl/go.sum
            trace/backend/go.sum

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: trace/frontend/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            conduit -> target
            kprobe -> target

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libsqlite3-dev clang llvm libelf-dev

      - name: Run validation suite
        shell: pwsh
        run: ./hack/validate-ci.ps1

  docker-smoke:
    name: Docker smoke builds
    needs: changes
    if: needs.changes.outputs.docker == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: sigil
            context: ./sigil
            file: ./sigil/Dockerfile
          - name: conduit
            context: .
            file: ./conduit/Dockerfile
          - name: kprobe
            context: .
            file: ./kprobe/Dockerfile
          - name: trace
            context: .
            file: ./trace/backend/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.name }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: false
          tags: meshlite/${{ matrix.name }}:ci-smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max
