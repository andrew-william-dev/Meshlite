kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: meshlite-dev-2
networking:
  # Use distinct pod and service CIDRs so the two clusters' overlay networks
  # do not conflict when cross-cluster routes are probed.
  podSubnet: "10.245.0.0/16"
  serviceSubnet: "10.97.0.0/16"
nodes:
  - role: control-plane
    extraPortMappings:
      # NodePort for the Conduit Ingress (service-beta side).
      - containerPort: 30443
        hostPort: 30443
        protocol: TCP
      # Optional: NodePort for test services.
      - containerPort: 30081
        hostPort: 30081
        protocol: TCP
  - role: worker
  - role: worker
