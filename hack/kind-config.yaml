kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: meshlite-dev
nodes:
  - role: control-plane
    # Extra port mappings let you NodePort-forward services to localhost
    # without needing kubectl port-forward during interactive testing.
    extraPortMappings:
      - containerPort: 30080
        hostPort: 30080
        protocol: TCP
  - role: worker
  - role: worker
