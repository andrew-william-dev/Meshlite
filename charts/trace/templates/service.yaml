apiVersion: v1
kind: Service
metadata:
  name: {{ include "trace.fullname" . }}
  labels:
    app: trace
    app.kubernetes.io/name: {{ include "trace.name" . }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app: trace
    app.kubernetes.io/name: {{ include "trace.name" . }}
  ports:
    - name: http
      port: {{ .Values.service.httpPort }}
      targetPort: http
    - name: metrics
      port: {{ .Values.service.metricsPort }}
      targetPort: metrics
