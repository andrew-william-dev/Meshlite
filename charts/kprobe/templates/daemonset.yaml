apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "kprobe.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: kprobe
spec:
  selector:
    matchLabels:
      app: kprobe
  template:
    metadata:
      labels:
        app: kprobe
    spec:
      serviceAccountName: {{ include "kprobe.fullname" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      tolerations:
        # Run on all nodes including control-plane.
        - operator: Exists
      hostPID: false
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: kprobe
          image: "{{ .Values.image.repository }}:{{ default .Chart.AppVersion .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --iface=$(IFACE)
            - --ebpf-path=$(EBPF_PATH)
            - --sigil-addr=$(SIGIL_ADDR)
            - --node-id=$(NODE_NAME)
            - --cluster-id=$(CLUSTER_ID)
            - --trace-url=$(TRACE_URL)
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: IFACE
              value: {{ .Values.ebpf.iface | quote }}
            - name: EBPF_PATH
              value: {{ .Values.ebpf.path | quote }}
            - name: SIGIL_ADDR
              value: {{ .Values.sigil.addr | quote }}
            - name: TRACE_URL
              value: {{ .Values.trace.addr | quote }}
            - name: CLUSTER_ID
              value: {{ .Values.cluster.id | quote }}
            - name: RUST_LOG
              value: "info"
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            privileged: true
            capabilities:
              add:
                - SYS_ADMIN
                - NET_ADMIN
                - SYS_RESOURCE
