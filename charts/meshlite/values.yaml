global:
  imageTag: ""

sigil:
  enabled: true
  image:
    repository: ghcr.io/andrew-william-dev/meshlite/sigil
    tag: ""
  imagePullSecrets: []
  existingRootCASecret: ""
  config:
    meshConfigMap: sigil-mesh-config
    meshConfigKey: mesh.yaml

kprobe:
  enabled: true
  image:
    repository: ghcr.io/andrew-william-dev/meshlite/kprobe
    tag: ""
  imagePullSecrets: []
  cluster:
    id: dev
  sigil:
    addr: sigil.meshlite-system.svc.cluster.local:8443
  trace:
    addr: http://trace.meshlite-system.svc.cluster.local:3000

trace:
  enabled: true
  image:
    repository: ghcr.io/andrew-william-dev/meshlite/trace
    tag: ""
  imagePullSecrets: []
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: trace.mesh.internal
        paths:
          - path: /
            pathType: Prefix
    tls: []

conduitEgress:
  enabled: false
  mode: egress
  image:
    repository: ghcr.io/andrew-william-dev/meshlite/conduit
    tag: ""
  imagePullSecrets: []
  cluster:
    id: cluster-1
  sigil:
    addr: sigil.meshlite-system.svc.cluster.local:8080
  trace:
    addr: http://trace.meshlite-system.svc.cluster.local:3000
  peer:
    addr: ""

conduitIngress:
  enabled: false
  mode: ingress
  image:
    repository: ghcr.io/andrew-william-dev/meshlite/conduit
    tag: ""
  imagePullSecrets: []
  cluster:
    id: cluster-2
  sigil:
    addr: sigil.meshlite-system.svc.cluster.local:8080
  trace:
    addr: http://trace.meshlite-system.svc.cluster.local:3000
  peer:
    addr: ""

# Optional demo workloads used for the live validator walkthrough.
demo:
  enabled: false
  namespace: meshlite-test
  createNamespace: true
  image:
    repository: meshlite/service-validator
    tag: demo-fix
    pullPolicy: IfNotPresent
  imagePullSecrets: []
  clusterName: cluster-1
  ui:
    enabled: false
    serviceName: validator-ui
    servicePort: 8080
    sameTargetName: validator-same
    sameTargetUrl: ""
    crossTargetName: validator-cross
    crossTargetUrl: ""
    crossTargetHost: validator-cross
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 250m
        memory: 128Mi
  same:
    enabled: false
    serviceName: validator-same
    servicePort: 8080
    resources:
      requests:
        cpu: 50m
        memory: 48Mi
      limits:
        cpu: 200m
        memory: 96Mi
  cross:
    enabled: false
    serviceName: validator-cross
    servicePort: 8080
    resources:
      requests:
        cpu: 50m
        memory: 48Mi
      limits:
        cpu: 200m
        memory: 96Mi
