apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "conduit.fullname" . }}
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "conduit.fullname" . }}
  namespace: {{ .Release.Namespace }}
rules: []
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "conduit.fullname" . }}
  namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "conduit.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "conduit.fullname" . }}
    namespace: {{ .Release.Namespace }}
